<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body{
      margin: 0;
      padding: 0;
    }
    .wrap
    {
      position: relative;
      margin: 0 auto;
      max-width: 1000px;
      width: 100%;
    }
    img
    {
      display: block;
      width: 100%;
    }
    .icons
    {
      display: flex;
      gap: 0.5%;
      padding-left: 28.5%;
      position: absolute;
      bottom: 8%;
      left: 0;
      width: 100%;
    }
    .icons a
    {
      display: block;
      width: 2.5%;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="https://leonakuo.github.io/maggiey/card.png" alt="" class="card">
    <div class="icons">
      <a href="#"><img src="https://leonakuo.github.io/maggiey/fb.png" alt=""></a>
      <a href="#"><img src="https://leonakuo.github.io/maggiey/in.png" alt=""></a>
      <a href="#"><img src="https://leonakuo.github.io/maggiey/ig.png" alt=""></a>
    </div>
  </div>
</body>
</html>
